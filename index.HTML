<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram Mini Game</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
margin:0;
background:#0f1115;
color:white;
font-family:system-ui;
overflow-x:hidden;
}

.top{
padding:15px;
text-align:center;
font-weight:bold;
font-size:18px;
}

.balance{
font-size:22px;
margin-top:5px;
}

.center{
text-align:center;
margin-top:40px;
}

.farmBtn{
width:180px;
height:180px;
border-radius:50%;
border:none;
font-size:26px;
background:linear-gradient(145deg,#2b313a,#111318);
color:white;
box-shadow:0 0 25px #000;
transition:.1s;
}

.farmBtn:active{
transform:scale(.95);
}

.case{
margin:20px;
padding:15px;
background:#1b2028;
border-radius:14px;
}

button{
background:#2a85ff;
border:none;
color:white;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
}

.rouletteWrap{
margin-top:20px;
overflow:hidden;
width:100%;
border-top:2px solid #2a85ff;
border-bottom:2px solid #2a85ff;
}

.roulette{
display:flex;
transition:transform 4s cubic-bezier(.1,.7,.1,1);
}

.slot{
min-width:80px;
padding:20px 0;
text-align:center;
font-size:18px;
}

.pointer{
text-align:center;
font-size:24px;
margin-top:-10px;
color:#2a85ff;
}

.inventory{
padding:15px;
}

.itemCard{
background:#1b2028;
padding:15px;
border-radius:12px;
margin-bottom:10px;
text-align:center;
}

.itemCard img{
width:60px;
}
</style>
</head>

<body>

<div class="top">
Mini Clicker
<div class="balance">⭐ <span id="balance">0</span></div>
</div>

<div class="center">
<button class="farmBtn" onclick="farm()">+1</button>
</div>

<div class="case">
<b>🎰 Бесплатный кейс</b><br><br>
<button onclick="openCase()">Открыть</button>

<div class="pointer">▼</div>

<div class="rouletteWrap">
<div class="roulette" id="roulette"></div>
</div>
</div>

<div class="inventory">
<h3>Инвентарь</h3>
<div id="inv"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let balance = 0;
let inventory = [];
let clickCooldown = false;
let spinning = false;

function save(){
localStorage.setItem("balance",balance);
localStorage.setItem("inv",JSON.stringify(inventory));
}

function load(){
balance = parseInt(localStorage.getItem("balance")) || 0;
inventory = JSON.parse(localStorage.getItem("inv")) || [];
updateUI();
}

function updateUI(){
document.getElementById("balance").innerText = balance;

let inv = document.getElementById("inv");
inv.innerHTML = "";

inventory.forEach(i=>{
inv.innerHTML += `
<div class="itemCard">
<img src="champagne.png"><br>
Шампанское 🍾
</div>`;
});
}

function farm(){
if(clickCooldown) return;
clickCooldown = true;

balance += 1;
updateUI();
save();

setTimeout(()=>clickCooldown=false,500);
}

function roll(){
let r = Math.random()*100;
if(r<60) return 5;
if(r<85) return 10;
if(r<95) return 25;
if(r<99) return "champagne";
return 0;
}

function openCase(){
if(spinning) return;
spinning = true;

let roulette = document.getElementById("roulette");
roulette.innerHTML = "";
roulette.style.transform = "translateX(0px)";

let items = ["5⭐","10⭐","25⭐","0","🍾"];
let finalReward = roll();

for(let i=0;i<40;i++){
let div = document.createElement("div");
div.className = "slot";
div.innerText = items[Math.floor(Math.random()*items.length)];
roulette.appendChild(div);
}

let stopIndex = 30;

roulette.children[stopIndex].innerText =
finalReward === "champagne" ? "🍾" :
typeof finalReward === "number" ? finalReward+"⭐" : "0";

setTimeout(()=>{
roulette.style.transform = `translateX(-${stopIndex*80}px)`;
},50);

setTimeout(()=>{
if(typeof finalReward === "number"){
balance += finalReward;
}else if(finalReward === "champagne"){
inventory.push("champagne");
}
updateUI();
save();
spinning = false;
tg.HapticFeedback.notificationOccurred("success");
},4000);
}

load();
</script>

</body>
</html>
