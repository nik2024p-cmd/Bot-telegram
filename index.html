<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click and Play</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center;}
h1{margin:15px 0;}
.balance{font-size:20px;margin-bottom:10px;}
.screen{display:none;padding-bottom:90px;}
.active{display:block;}

.click-wrap{margin-top:80px;display:flex;justify-content:center;}
.click-btn{
width:150px;height:150px;border-radius:50%;
border:none;background:#555;
font-size:50px;color:#fff;
box-shadow:0 0 20px #777;
}

.cases{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:15px;
}
.case{background:#111;padding:15px;border-radius:12px;}
.case button{
margin-top:10px;padding:10px;width:100%;
border:none;border-radius:8px;
background:#444;color:#fff;
}

.inventory-item{
background:#111;margin:10px;padding:10px;
border-radius:10px;
display:flex;justify-content:space-between;align-items:center;
}
.inventory-item button{
padding:5px 10px;border:none;border-radius:6px;
background:#444;color:#fff;
}

.modal-bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.modal{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

.pointer{font-size:25px;margin:10px 0;}

.roulette{
overflow:hidden;
border-top:2px solid #333;
border-bottom:2px solid #333;
margin:15px 0;
}

.roulette-track{display:flex;}

.roulette-item{
min-width:90px;
font-size:26px;
padding:15px;
border-right:1px solid #222;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
}
.nav button{
flex:1;
padding:15px;
border:none;
background:#111;
color:#fff;
font-size:16px;
}
.nav button.active{background:#333;}
</style>
</head>
<body>

<h1>Click and Play</h1>
<div class="balance">⭐ <span id="balance">0.00</span></div>

<div id="clickScreen" class="screen active">
<div class="click-wrap">
<button class="click-btn" onclick="tap()">⭐</button>
</div>
</div>

<div id="caseScreen" class="screen">
<div class="cases" id="caseList"></div>
</div>

<div id="inventoryScreen" class="screen">
<div id="inventoryList"></div>
</div>

<div class="modal-bg" id="modalBg">
<div class="modal">
<h2 id="caseTitle"></h2>
<div class="pointer">▼</div>
<div class="roulette">
<div class="roulette-track" id="rouletteTrack"></div>
</div>
<div id="resultText"></div>
<br>
<button id="closeBtn" onclick="closeModal()">Закрыть</button>
</div>
</div>

<div class="nav">
<button onclick="showScreen('click')" id="btnClick" class="active">Игра</button>
<button onclick="showScreen('cases')" id="btnCases">Кейсы</button>
<button onclick="showScreen('inventory')" id="btnInv">Инвентарь</button>
</div>

<script>

/* ===== ПЕРЕМЕННЫЕ ===== */

let balance = parseFloat(localStorage.getItem("balance")) || 0;
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
let lastFreeOpen = parseInt(localStorage.getItem("lastFreeOpen")) || 0;
let spinning = false;

updateBalance();

function saveGame(){
localStorage.setItem("balance", balance);
localStorage.setItem("inventory", JSON.stringify(inventory));
localStorage.setItem("lastFreeOpen", lastFreeOpen);
}

const items = {
star1:{icon:"⭐1",value:1,weight:50},
star2:{icon:"⭐2",value:2,weight:45},
star3:{icon:"⭐3",value:3,weight:40},
star4:{icon:"⭐4",value:4,weight:35},
star5:{icon:"⭐5",value:5,weight:30},
champagne:{icon:"🍾",value:50,weight:6},
heart:{icon:"💝",value:15,weight:15},
trophy:{icon:"🏆",value:100,weight:3}
};

const allItems = Object.keys(items);

const cases = {
free:{name:"Бесплатный",price:0},
case1:{name:"Кейс #1",price:10},
case2:{name:"Кейс #2",price:25},
case3:{name:"Кейс #3",price:50},
case4:{name:"Кейс #4",price:75},
case5:{name:"Кейс #5",price:100}
};

/* ===== КЛИКЕР ===== */

function tap(){
balance += 0.05;
balance = Math.round(balance*100)/100;
updateBalance();
saveGame();
}

function updateBalance(){
document.getElementById("balance").innerText = balance.toFixed(2);
}

/* ===== ЭКРАНЫ ===== */

function showScreen(name){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
if(name==="click"){clickScreen.classList.add("active");btnClick.classList.add("active");}
if(name==="cases"){caseScreen.classList.add("active");btnCases.classList.add("active");}
if(name==="inventory"){inventoryScreen.classList.add("active");btnInv.classList.add("active");renderInventory();}
}

/* ===== РАНДОМ ===== */

function weightedRandom(){
let total=0;
allItems.forEach(i=>total+=items[i].weight);
let rand=Math.random()*total;
let sum=0;
for(let i of allItems){
sum+=items[i].weight;
if(rand<=sum) return i;
}
}

/* ===== ОТКРЫТИЕ КЕЙСА ===== */

function openCase(key){
if(spinning) return;

let c=cases[key];

if(key==="free"){
let now=Date.now();
let cooldown=600000;
if(now-lastFreeOpen < cooldown){
let remain=Math.ceil((cooldown-(now-lastFreeOpen))/1000);
return alert("Бесплатный кейс через "+remain+" сек.");
}
lastFreeOpen=now;
}

if(balance<c.price && key!=="free") return alert("Недостаточно звёзд!");

if(key!=="free"){balance-=c.price;updateBalance();}

saveGame();
openModal(c.name);
}

function openModal(title){
spinning=true;
document.getElementById("modalBg").style.display="flex";
document.getElementById("caseTitle").innerText=title;
document.getElementById("resultText").innerText="";
document.getElementById("closeBtn").disabled=true;

let track=document.getElementById("rouletteTrack");
track.innerHTML="";
track.style.transition="none";
track.style.transform="translateX(0px)";

let winIndex=40;
let realWin=weightedRandom();

for(let i=0;i<60;i++){
let item=(i===winIndex)?realWin:allItems[Math.floor(Math.random()*allItems.length)];
let div=document.createElement("div");
div.className="roulette-item";
div.innerText=items[item].icon;
track.appendChild(div);
}

let itemWidth=90;
let centerOffset=(itemWidth*winIndex)-150;

setTimeout(()=>{
track.style.transition="transform 4s cubic-bezier(.17,.67,.25,1)";
track.style.transform="translateX(-"+centerOffset+"px)";
},100);

setTimeout(()=>{
inventory.push(realWin);
saveGame();
document.getElementById("resultText").innerText="Выпало: "+items[realWin].icon;
spinning=false;
document.getElementById("closeBtn").disabled=false;
},4500);
}

function closeModal(){
if(spinning) return;
document.getElementById("modalBg").style.display="none";
}

/* ===== ИНВЕНТАРЬ ===== */

function renderInventory(){
let list=document.getElementById("inventoryList");
list.innerHTML="";
inventory.forEach((item,index)=>{
let div=document.createElement("div");
div.className="inventory-item";
div.innerHTML=
items[item].icon+
"<button onclick='sell("+index+")'>Продать</button>";
list.appendChild(div);
});
}

function sell(i){
balance+=items[inventory[i]].value;
inventory.splice(i,1);
updateBalance();
saveGame();
renderInventory();
}

/* ===== КЕЙСЫ ===== */

function renderCases(){
let list=document.getElementById("caseList");
for(let key in cases){
let c=cases[key];
let div=document.createElement("div");
div.className="case";
div.innerHTML=
"<b>"+c.name+"</b><br>"+
"<button onclick='openCase(\""+key+"\")'>Открыть</button>";
list.appendChild(div);
}
}

renderCases();

</script>
</body>
</html>
