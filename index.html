<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click and Play</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;text-align:center;}
h1{margin:15px 0;}
.balance{font-size:20px;margin-bottom:10px;}
.screen{display:none;padding-bottom:90px;}
.active{display:block;}

.click-wrap{margin-top:80px;display:flex;justify-content:center;}
.click-btn{
width:150px;height:150px;border-radius:50%;
border:none;background:#555;
font-size:50px;color:#fff;
box-shadow:0 0 20px #777;
}

.cases{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:15px;
}
.case{background:#111;padding:15px;border-radius:12px;}
.case button{
margin-top:10px;padding:10px;width:100%;
border:none;border-radius:8px;
background:#444;color:#fff;
}

.inventory-item{
background:#111;margin:10px;padding:10px;
border-radius:10px;
display:flex;justify-content:space-between;align-items:center;
}
.inventory-item button{
padding:5px 10px;border:none;border-radius:6px;
background:#444;color:#fff;
}

.modal-bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.modal{
background:#111;
padding:20px;
border-radius:15px;
width:90%;
max-width:400px;
}

.pointer{
font-size:25px;
margin:10px 0;
}

.roulette{
overflow:hidden;
border-top:2px solid #333;
border-bottom:2px solid #333;
margin:15px 0;
}

.roulette-track{
display:flex;
}

.roulette-item{
min-width:90px;
font-size:26px;
padding:15px;
border-right:1px solid #222;
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
}
.nav button{
flex:1;
padding:15px;
border:none;
background:#111;
color:#fff;
font-size:16px;
}
.nav button.active{
background:#333;
}
</style>
</head>
<body>

<h1>Click and Play</h1>
<div class="balance">⭐ <span id="balance">0.00</span></div>

<div id="clickScreen" class="screen active">
<div class="click-wrap">
<button class="click-btn" onclick="tap()">⭐</button>
</div>
</div>

<div id="caseScreen" class="screen">
<div class="cases" id="caseList"></div>
</div>

<div id="inventoryScreen" class="screen">
<div id="inventoryList"></div>
</div>

<div class="modal-bg" id="modalBg">
<div class="modal">
<h2 id="caseTitle"></h2>
<div class="pointer">▼</div>
<div class="roulette">
<div class="roulette-track" id="rouletteTrack"></div>
</div>
<div id="resultText"></div>
<br>
<button onclick="closeModal()">Закрыть</button>
</div>
</div>

<div class="nav">
<button onclick="showScreen('click')" id="btnClick" class="active">Игра</button>
<button onclick="showScreen('cases')" id="btnCases">Кейсы</button>
<button onclick="showScreen('inventory')" id="btnInv">Инвентарь</button>
</div>

<script>
let balance = parseFloat(localStorage.getItem("balance")) || 0;
let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
updateBalance();

function saveGame(){
localStorage.setItem("balance", balance);
localStorage.setItem("inventory", JSON.stringify(inventory));
}

const items = {
star1:{icon:"⭐",value:1},
star2:{icon:"⭐",value:2},
star3:{icon:"⭐",value:3},
star4:{icon:"⭐",value:4},
star5:{icon:"⭐",value:5},
champagne:{icon:"🍾",value:50},
heart:{icon:"💝",value:15},
cake:{icon:"🎂",value:50},
trophy:{icon:"🏆",value:100},
gift:{icon:"🎁",value:25},
rose:{icon:"🌹",value:25}
};

const allItems = Object.keys(items);

const cases = {
free:{name:"Бесплатный",price:0},
case1:{name:"Кейс #1",price:10},
case2:{name:"Кейс #2",price:25},
case3:{name:"Кейс #3",price:50},
case4:{name:"Кейс #4",price:75},
case5:{name:"Кейс #5",price:100}
};

function tap(){
balance += 0.1;
updateBalance();
saveGame();
}

function updateBalance(){
document.getElementById("balance").innerText = balance.toFixed(2);
}

function showScreen(name){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
if(name==="click"){clickScreen.classList.add("active");btnClick.classList.add("active");}
if(name==="cases"){caseScreen.classList.add("active");btnCases.classList.add("active");}
if(name==="inventory"){inventoryScreen.classList.add("active");btnInv.classList.add("active");renderInventory();}
}

function openCase(key){
let c=cases[key];
if(balance<c.price && key!=="free") return alert("Недостаточно звёзд!");
if(key!=="free"){
balance-=c.price;
updateBalance();
saveGame();
}
openModal(c.name);
}

function openModal(title){
document.getElementById("modalBg").style.display="flex";
document.getElementById("caseTitle").innerText=title;
document.getElementById("resultText").innerText="";

let track=document.getElementById("rouletteTrack");
track.innerHTML="";
track.style.transition="none";
track.style.transform="translateX(0px)";

let arr=[];
for(let i=0;i<60;i++){
arr.push(allItems[Math.floor(Math.random()*allItems.length)]);
}

let winIndex=45;
let winItem=allItems[Math.floor(Math.random()*allItems.length)];
arr[winIndex]=winItem;

arr.forEach(i=>{
let div=document.createElement("div");
div.className="roulette-item";
div.innerText=items[i].icon;
track.appendChild(div);
});

let offset=winIndex*90-150;

setTimeout(()=>{
track.style.transition="transform 3s ease-out";
track.style.transform="translateX(-"+offset+"px)";
},100);

setTimeout(()=>{
inventory.push(winItem);
saveGame();
document.getElementById("resultText").innerText="Выпало: "+items[winItem].icon;
renderInventory();
},3100);
}

function closeModal(){
document.getElementById("modalBg").style.display="none";
}

function renderInventory(){
let list=document.getElementById("inventoryList");
list.innerHTML="";
inventory.forEach((item,index)=>{
let div=document.createElement("div");
div.className="inventory-item";
div.innerHTML=
items[item].icon+
"<button onclick='sell("+index+")'>Продать</button>";
list.appendChild(div);
});
}

function sell(i){
balance+=items[inventory[i]].value;
inventory.splice(i,1);
updateBalance();
saveGame();
renderInventory();
}

function renderCases(){
let list=document.getElementById("caseList");
list.innerHTML="";
for(let key in cases){
let c=cases[key];
let div=document.createElement("div");
div.className="case";
div.innerHTML=
"<b>"+c.name+"</b><br>"+
"<button onclick='openCase(\""+key+"\")'>Открыть</button>";
list.appendChild(div);
}
}

renderCases();
renderInventory();
</script>
</body>
</html>
